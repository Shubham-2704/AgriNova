version: 1.0
runtime: python3
build:
  commands:
    build:
      - echo "Starting build process..."
      - cd Backend
      - echo "Current directory: $(pwd)"
      - echo "Files in directory:"
      - ls -la
      - echo "Installing basic dependencies first..."
      - pip install --upgrade pip setuptools wheel
      - echo "Installing minimal requirements..."
      - pip install --timeout 300 -r requirements-minimal.txt
      - echo "Installing ML dependencies..."
      - pip install --timeout 600 pandas==2.1.3 numpy==1.26.2 scikit-learn==1.3.2 joblib==1.3.2
      - echo "Build completed successfully"
run:
  command: cd Backend && python -m uvicorn main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: ENVIRONMENT
      value: production
    - name: CORS_ORIGINS
      value: https://agrinova.me,https://www.agrinova.me