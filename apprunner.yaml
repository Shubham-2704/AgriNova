version: 1.0
runtime: python3
build:
  commands:
    build:
      - echo "Installing dependencies..."
      - cd Backend
      - pip install -r requirements.txt
      - echo "Build completed successfully"
run:
  runtime-version: 3.9
  command: cd Backend && uvicorn main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: ENVIRONMENT
      value: production
    - name: CORS_ORIGINS
      value: https://agrinova.me,https://www.agrinova.me